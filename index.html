<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmyfly2026-Bollywood movies, South Hindi dubbed movies, Hollywood Hindi movies, animation films, TV shows and Hindi web series updates with 480p, 720p and ...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Core Reset & Fallback */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body, html { 
            min-height: 100vh;
            background-color: #000; 
            color: #fff; 
            font-family: sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Fixed background engine remains locked in place across all display regions */
        .video-background {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
            pointer-events: none; 
        }
        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2;
        }

        /* Foreground Wrapper: Sits safely on top of video layer */
        .page-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Main Content Layout Block */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh; 
            padding: 20px;
        }

        /* Heading container configuration handles horizontal alignment elements */
        h1 {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap; /* Allows safe visual wrapping to prevent small mobile screens from cracking text structures */
            gap: 0.3em; 
            margin-top: 0;
            margin-bottom: 20px;
            letter-spacing: 1px;
            font-size: 3.5rem; /* Increased base font size for an ultra-premium widescreen layout signature */
            text-transform: uppercase;
        }

        /* Large inline graphic configuration metrics */
        .heading-logo {
            height: 4em; /* Increased proportional scale limit to lift boundary constraints and make the logo large */
            width: auto;   /* Maintains core structural file dimensions securely without layout squishing */
            display: block;
            filter: drop-shadow(0 0 15px rgba(255, 51, 102, 0.7)); /* Reinforced cyberpunk drop glow footprint */
            
            /* 🟢 FIXED: Shifts the logo container exactly 10px to the left */
            margin-left: -40px; 
            
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        /* Paragraph presentation typography */
        .content p {
            font-size: 1.25rem;
            margin-bottom: 30px;
            opacity: 0.9;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        
    
        .site-footer {
            width: 100%;
            text-align: center;
            padding: 40px 20px;
            background-color: rgba(0, 0, 0, 0.85); 
            border-top: 1px solid #111;
        }
        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .footer-links a {
            color: #ff3366; 
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s ease;
        }
        .footer-links a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Mobile Viewport Scaler Compactions */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
                gap: 0.2em;
            }
            .heading-logo {
                height: 1.3em; /* Slightly scales down on mobile viewports to cleanly match device bounds */
                /* 🟢 FIXED: Keeps the left shift uniform on mobile frames */
                margin-left: -6px; 
            }
        }
    </style>
</head>
<body>

    <!-- Persistent Background Video Matrix Layer -->
    <div class="video-background">
      <video autoplay loop muted playsinline>
        <source src="bgd.mp4" type="video/mp4">
      </video>
      <div class="video-overlay"></div>
    </div>

        
        <!-- Hero section containing initial loading display nodes -->
        <main class="content">
            <!-- WELCOME TO text line and large image asset aligned together on the same horizontal grid path -->
            <h1>
                <span>WELCOME TO</span> 
                <img src="img1.png" alt="FILMYFLY" class="heading-logo">
            </h1>
            <p>Watch Movies Online And Download Them</p>
            
            <button class="futuristic-btn" id="download-link">
                <span class="btn-text">View Full SITE</span>
                <span class="btn-glitch-layer"></span>
            </button>
        </main>

        
        <!-- Absolute bottom viewport footer links element -->
        <footer class="site-footer">
            <div class="footer-content">
                <p>&copy; <span id="current-year"></span> FILMYFLY. All Rights Reserved.</p>
                <div class="footer-links">
                    <a href="terms.html" id="terms-link" target="_self">Terms of Service</a>
                </div>
            </div>
        </footer>
        
    </div>

    <!-- JavaScript Link Controller Engine -->
    <script>
        // Automatically calculate current year
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Variable to keep track of the active countdown timer
        let clickInactivityTimer = null;

        // Ensure script hooks cleanly to the button instance
        document.getElementById('download-link').addEventListener('click', function(event) {
            event.preventDefault();

            // Clear the previous 10-second timer whenever a new click happens
            if (clickInactivityTimer) {
                clearTimeout(clickInactivityTimer);
            }

            // Fetch click count or default to zero
            let clickCount = parseInt(sessionStorage.getItem('user_click_count')) || 0;
            
            clickCount++;
            sessionStorage.setItem('user_click_count', clickCount);

            // Hook onto the text child element of the button to update feedback visually
            const btnText = this.querySelector('.btn-text');

            // Define destination URLs
            const adWebsite = "https://google.com";  
            const trueWebsite = "https://filmyfly.luxe"; 

            // Process text changes based on click index
            if (clickCount === 1) {
                if (btnText) btnText.textContent = "Processing (1/2)...";
                window.open(adWebsite, '_blank', 'noopener,noreferrer');
            } else if (clickCount === 2) {
                // Reverts button text instantly back to default state on second click
                if (btnText) btnText.textContent = "View Full SITE";
                window.open(adWebsite, '_blank', 'noopener,noreferrer');
            } else if (clickCount >= 3) {
                sessionStorage.setItem('user_click_count', 0);
                window.open(trueWebsite, '_blank', 'noopener,noreferrer');
                return;
            }

            // 10-second idle timer fallback to reset counter tracking metrics back to baseline
            clickInactivityTimer = setTimeout(function() {
                sessionStorage.setItem('user_click_count', 0);
                if (btnText) btnText.textContent = "View Full SITE";
                console.log("Inactivity threshold reached. Click gateway has been reset.");
            }, 10000); // 10 seconds threshold
        });
    </script>

</body>
</html>
