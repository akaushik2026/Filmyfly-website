<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Download Portal</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google AdSense Platform Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9973192182088068"
     crossorigin="anonymous"></script>

    <style>
        /* Fallback: ensure screen is black if style.css fails to load */
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }
        /* Prevents users from selecting text or images on the site */
        body, html {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        /* Layout fix to push footer down */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 2;
            position: relative;
            padding: 20px;
        }

        /* Top Center Logo Container */
        .brand-logo {
            max-width: 150px; /* Limits width so it remains clean on mobile */
            height: auto;
            margin-bottom: 20px; /* Space between logo and headline */
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.5)); /* Futuristic neon glow */
            pointer-events: none; /* Prevents users from dragging or saving the logo image */
        }
        
        /* Main Text Styling */
        h1 {
            margin-top: 0;
            margin-bottom: 5px;
        }
        p {
            margin-bottom: 25px;
        }

        /* Main Tab Navigation Link Text */
        .main-tab-nav {
            margin-bottom: 25px;
        }
        .main-tab-nav a {
            color: #ff3366; /* Vibrant futuristic accent color */
            text-decoration: none;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            transition: opacity 0.2s ease, text-shadow 0.2s ease;
            display: inline-block;
        }
        .main-tab-nav a:hover {
            opacity: 0.8;
            text-shadow: 0 0 8px rgba(255, 51, 102, 0.6);
        }

        /* High-Visibility Notice Text */
        .click-notice {
            color: #ccff00; /* High-intensity neon warning chartreuse */
            font-family: sans-serif;
            font-size: 14px;
            font-weight: 800; /* Heavy weight forces readability */
            letter-spacing: 0.8px;
            margin-top: 25px;
            margin-bottom: 0;
            max-width: 360px;
            line-height: 1.5;
            text-transform: uppercase; /* Forces immediate cognitive awareness */
            animation: pulse-glow 2s infinite alternate; /* Dynamic attraction loop */
        }

        /* Attraction Glow Loop Configuration */
        @keyframes pulse-glow {
            0% {
                text-shadow: 0 0 4px rgba(204, 255, 0, 0.4);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 15px rgba(204, 255, 0, 0.9), 0 0 20px rgba(204, 255, 0, 0.4);
                transform: scale(1.02); /* Slight scale breathing grabs human attention */
            }
        }

        /* Standard Copyright Footer Styling */
        .site-footer {
            background-color: rgba(0, 0, 0, 0.9);
            color: #888;
            text-align: center;
            padding: 20px;
            font-size: 14px;
            font-family: sans-serif;
            border-top: 1px solid #222;
            z-index: 10;
            position: relative;
        }
        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        /* Terms Link Styling */
        .footer-links a {
            color: #00ffcc; /* Futuristic accent color */
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            display: inline-block;
        }
        .footer-links a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
</head>
